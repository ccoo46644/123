<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全螢幕貼圖！Honobono × Snoopy（冬） Sticker Shop</title>
    
    <!-- Weebly 崁入所需之 React 與外部庫 CDN（免編譯、單一檔案直接執行） -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');

        /* 強力隱藏 Weebly 預設多餘的頁首頁尾、導覽列，確保貼圖商店極致滿版乾淨 */
        #header-wrap, #nav-wrap, .weebly-header, header.weebly-header, .header-wrap, 
        .mobile-nav-trigger, .hamburger, .w-nav, #mobile-nav, .footer-wrap, #footer,
        .weebly-footer, .weebly-page-footer {
            display: none !important;
            height: 0 !important;
            margin: 0 !important;
            padding: 0 !important;
            overflow: hidden !important;
        }

        html, body {
            height: 100% !important;
            width: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
            background-color: #f0f2f5 !important;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif !important;
            -webkit-tap-highlight-color: transparent;
            text-align: left !important; /* 強制左對齊，防止 Weebly 樣式置中 */
        }
        
        #root { 
            width: 100% !important;
            max-width: 600px !important; /* 手機版與桌面版最適寬度 */
            margin: 0 auto !important; 
            background: white !important; 
            min-height: 100vh !important;
            position: relative !important;
            box-shadow: 0 0 40px rgba(0,0,0,0.05) !important;
            display: block !important;
        }

        /* 手機板強制 100% 滿版 */
        @media (max-width: 600px) {
            #root {
                max-width: 100% !important;
                box-shadow: none !important;
            }
        }

        /* 強制覆蓋 Weebly 對標題與段落的預設侵入式樣式 */
        #root h1, #root h2, #root p, #root span, #root a {
            margin: 0 !important;
            padding: 0 !important;
            text-transform: none !important;
            letter-spacing: normal !important;
            text-align: left !important;
        }

        /* 最上方導覽條標題置中樣式 */
        #root .top-bar-title {
            text-align: center !important;
            width: 100% !important;
            display: block !important;
            letter-spacing: 0.2em !important;
            color: white !important;
        }

        #root .sticker-title {
            font-size: 20px !important;
            line-height: 1.3 !important;
            font-weight: 700 !important;
            color: #000 !important;
            display: block !important;
            margin-bottom: 4px !important;
        }

        #root .price-text {
            font-size: 24px !important;
            color: #5cba3d !important;
            font-weight: 700 !important;
            display: block !important;
        }

        /* 作者資訊樣式 */
        #root .author-box {
            text-align: left !important;
            display: block !important;
            width: 100% !important;
            margin-bottom: 8px !important;
        }

        #root .author-box a {
            text-align: left !important;
            display: inline-block !important;
            color: #6b7280 !important;
        }

        /* 隱藏預設捲軸，讓介面像 App 一樣簡潔 */
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-fade-in {
            animation: fadeIn 0.2s ease-out forwards;
        }

        /* 貼圖列表動態特效 */
        .sticker-item {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            touch-action: manipulation;
            position: relative;
            z-index: 1;
        }
        
        .sticker-item.active {
            transform: scale(1.35) !important;
            z-index: 50 !important;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15));
        }

        /* 仿 LINE 按鈕字距優化 */
        #root .btn-text {
            letter-spacing: 0.15em !important;
            text-indent: 0.15em !important;
            text-align: center !important;
        }

        /* LINE 全螢幕貼圖專屬震撼彈出動畫 */
        @keyframes popupOpen {
            0% { opacity: 0; transform: scale(0.5) rotate(-5deg); }
            50% { transform: scale(1.1) rotate(2deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }
        .animate-popup-open {
            animation: popupOpen 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>
<body>
    <!-- React 印出掛載點 -->
    <div id="root"></div>

    <!-- React 邏輯，經由 Babel 在瀏覽器端即時解析，完美適應 Weebly 的任意環境 -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================
        // 金流/按鈕跳轉連結（可隨時修改）
        // ==========================================
        const GIFT_URL = "https://goodgifttosend.tw/hDMlp";     // 贈送禮物連結
        const DOWNLOAD_URL = "https://goodgifttosend.tw/hDMlp"; // 下載連結
        // ==========================================

        const StickerDetail = () => (
            <section className="w-full">
                {/* 頂部標題列 */}
                <div className="bg-[#333333] py-4 mb-6">
                    <h1 className="top-bar-title text-lg font-bold">個人原創貼圖</h1>
                </div>

                <div className="px-5">
                    <div className="flex flex-row gap-4 items-start mb-6">
                        {/* 左側貼圖封面 */}
                        <div className="w-[120px] flex-shrink-0">
                            <div className="relative">
                                <img 
                                    src="https://stickershop.line-scdn.net/stickershop/v1/product/29826/LINEStorePC/main.png?v=2" 
                                    className="w-full h-auto"
                                    alt="全螢幕貼圖！Honobono × Snoopy（冬）"
                                    referrerPolicy="no-referrer"
                                />
                            </div>
                        </div>

                        {/* 右側貼圖基本資訊 */}
                        <div className="flex-1 min-w-0">
                            <h2 className="sticker-title">全螢幕貼圖！Honobono × Snoopy（冬）</h2>
                            <div className="author-box">
                                <a 
                                    href="https://store.line.me/stickershop/author/254193/zh-Hant" 
                                    target="_blank" 
                                    rel="noopener noreferrer"
                                    className="text-[14px] underline underline-offset-4"
                                >
                                    TV TOKYO Communications Corporation/SNOOPY
                                </a>
                            </div>
                            <p className="text-[13px] text-black leading-snug mb-2" style={{textAlign: 'left'}}>
                                超人氣插畫家Honobono與Snoopy的聯名貼圖化身為全螢幕貼圖登場！用溫馨可愛的Snoopy佔滿整個大螢幕來表達心情吧！是各種冬季活動的最佳良伴♪
                            </p>
                            <span className="price-text font-bold">NT$0</span>
                        </div>
                    </div>

                    {/* 贈送與購買下載按鈕 */}
                    <div className="grid grid-cols-2 gap-3 mb-8">
                        <button 
                            onClick={() => window.location.href = GIFT_URL}
                            className="btn-text py-3 bg-[#464646] text-white font-bold text-[17px] rounded-md active:scale-95 transition-all outline-none"
                            style={{backgroundColor: '#464646 !important', color: 'white !important'}}
                        >
                            贈送禮物
                        </button>
                        <button 
                            onClick={() => window.location.href = DOWNLOAD_URL}
                            className="btn-text py-3 bg-[#5cba3d] text-white font-bold text-[17px] rounded-md active:scale-95 transition-all outline-none"
                            style={{backgroundColor: '#5cba3d !important', color: 'white !important'}}
                        >
                            下載
                        </button>
                    </div>
                </div>
            </section>
        );

        const StickerGrid = ({ onStickerClick, activeId }) => {
            // 此款 LINE 貼圖序號為 633047198 ~ 633047221（共 24 張全螢幕動態貼圖）
            const stickers = Array.from({ length: 24 }, (_, i) => ({
                id: 633047198 + i,
                url: `https://stickershop.line-scdn.net/stickershop/v1/sticker/${633047198 + i}/iPhone/sticker@2x.png?v=2`,
                animUrl: `https://stickershop.line-scdn.net/stickershop/v1/sticker/${633047198 + i}/android/sticker_popup.png?v=2`
            }));

            return (
                <div className="border-t border-gray-100 pt-6 px-4">
                    <p className="text-center text-black text-[13px] mb-6" style={{textAlign: 'center'}}>點擊貼圖即可預覽。</p>
                    <div className="grid grid-cols-4 gap-4">
                        {stickers.map((sticker) => {
                            const isActive = activeId === sticker.id;
                            return (
                                <div
                                    key={sticker.id}
                                    className={`sticker-item cursor-pointer ${isActive ? 'active' : ''}`}
                                    onClick={() => onStickerClick(sticker)}
                                >
                                    <img 
                                        src={isActive ? sticker.animUrl : sticker.url} 
                                        alt={`貼圖 ${sticker.id}`}
                                        className="w-full h-auto object-contain"
                                        referrerPolicy="no-referrer"
                                    />
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [selectedSticker, setSelectedSticker] = useState(null);

            // 自動計時器：於全螢幕展示剛好 3.0 秒後自動關閉
            useEffect(() => {
                if (selectedSticker) {
                    const timer = setTimeout(() => { 
                        setSelectedSticker(null); 
                    }, 3000); // 3000 毫秒 = 3.0 秒
                    return () => clearTimeout(timer);
                }
            }, [selectedSticker]);

            return (
                <div className="min-h-screen bg-white relative">
                    <main className="w-full py-4">
                        <StickerDetail />
                        <StickerGrid 
                            onStickerClick={(sticker) => setSelectedSticker(sticker)} 
                            activeId={selectedSticker?.id}
                        />
                    </main>

                    {/* LINE 震撼風格彈出效果（全螢幕預覽） */}
                    {selectedSticker && (
                        <div 
                            className="fixed inset-0 bg-black/70 z-[9999] flex flex-col items-center justify-center p-4 cursor-pointer select-none animate-fade-in"
                            onClick={() => setSelectedSticker(null)}
                        >
                            {/* 模擬 LINE 全螢幕貼圖白底微光背景發散燈光 */}
                            <div className="absolute w-[320px] h-[320px] bg-white/10 rounded-full blur-[90px] pointer-events-none"></div>
                            
                            <div className="relative flex flex-col items-center justify-center w-full max-w-[85%] md:max-w-[420px]">
                                <img 
                                    src={`https://stickershop.line-scdn.net/stickershop/v1/sticker/${selectedSticker.id}/android/sticker_popup.png?v=2`}
                                    alt="全螢幕預覽"
                                    className="w-full h-auto object-contain max-h-[62vh] animate-popup-open drop-shadow-[0_20px_50px_rgba(255,255,255,0.2)]"
                                    referrerPolicy="no-referrer"
                                />
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // 渲染至網頁挂載點
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
