<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全螢幕貼圖！Honobono × Snoopy（冬） Sticker Shop</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            background-color: #f0f2f5;
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overflow-x: hidden;
        }

        #root {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.05);
        }

        @media (max-width: 600px) {
            #root {
                max-width: 100%;
                box-shadow: none;
            }
        }

        /* 隱藏捲軸 */
        ::-webkit-scrollbar {
            display: none;
        }
        
        * {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 頂部標題列 */
        .top-bar {
            background-color: #333333;
            color: white;
            padding: 16px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 0.2em;
            margin-bottom: 24px;
        }

        .content {
            padding: 0 20px;
        }

        /* 貼圖詳情區 */
        .sticker-detail {
            display: flex;
            gap: 16px;
            align-items: flex-start;
            margin-bottom: 24px;
        }

        .sticker-cover {
            width: 120px;
            flex-shrink: 0;
        }

        .sticker-cover img {
            width: 100%;
            height: auto;
            display: block;
        }

        .sticker-info {
            flex: 1;
            min-width: 0;
        }

        .sticker-title {
            font-size: 20px;
            font-weight: 700;
            color: #000;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .author-box {
            margin-bottom: 8px;
        }

        .author-box a {
            font-size: 14px;
            color: #6b7280;
            text-decoration: underline;
            text-decoration-offset: 4px;
        }

        .sticker-description {
            font-size: 13px;
            color: #000;
            line-height: 1.5;
            margin-bottom: 12px;
            text-align: left;
        }

        .price-text {
            font-size: 24px;
            color: #5cba3d;
            font-weight: 700;
            display: block;
        }

        /* 按鈕區 */
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 32px;
        }

        button {
            padding: 12px 16px;
            font-size: 17px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            letter-spacing: 0.15em;
            text-indent: 0.15em;
            transition: all 0.2s ease;
            font-family: 'Noto Sans TC', sans-serif;
            text-align: center;
        }

        .btn-gift {
            background-color: #464646;
            color: white;
        }

        .btn-gift:active {
            transform: scale(0.95);
        }

        .btn-download {
            background-color: #5cba3d;
            color: white;
        }

        .btn-download:active {
            transform: scale(0.95);
        }

        /* 貼圖網格分隔線 */
        .grid-divider {
            border-top: 1px solid #f3f4f6;
            padding-top: 24px;
            margin-top: 0;
        }

        .grid-hint {
            text-align: center;
            color: #000;
            font-size: 13px;
            margin-bottom: 24px;
        }

        /* 貼圖網格 */
        .sticker-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            padding-bottom: 24px;
        }

        .sticker-item {
            cursor: pointer;
            position: relative;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1;
        }

        .sticker-item img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        .sticker-item.active {
            transform: scale(1.35);
            z-index: 50;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15));
        }

        /* 彈出視窗 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            cursor: pointer;
            -webkit-user-select: none;
            user-select: none;
            animation: fadeIn 0.2s ease-out forwards;
        }

        .modal-content {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 85%;
        }

        @media (min-width: 768px) {
            .modal-content {
                max-width: 420px;
            }
        }

        .modal-image {
            width: 100%;
            height: auto;
            object-fit: contain;
            max-height: 62vh;
            filter: drop-shadow(0 20px 50px rgba(255, 255, 255, 0.2));
            animation: popupOpen 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .modal-glow {
            position: absolute;
            width: 320px;
            height: 320px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            filter: blur(90px);
            pointer-events: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes popupOpen {
            0% {
                opacity: 0;
                transform: scale(0.5) rotate(-5deg);
            }
            50% {
                transform: scale(1.1) rotate(2deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        @media (max-width: 600px) {
            .sticker-detail {
                gap: 12px;
                margin-bottom: 20px;
            }

            .sticker-cover {
                width: 100px;
            }

            .sticker-title {
                font-size: 18px;
            }

            .button-group {
                gap: 10px;
                margin-bottom: 24px;
            }

            button {
                padding: 10px 12px;
                font-size: 15px;
            }

            .sticker-grid {
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="root">
        <!-- 頂部標題 -->
        <div class="top-bar">個人原創貼圖</div>

        <!-- 主要內容 -->
        <div class="content">
            <!-- 貼圖詳情 -->
            <div class="sticker-detail">
                <div class="sticker-cover">
                    <img 
                        src="https://stickershop.line-scdn.net/stickershop/v1/product/29826/LINEStorePC/main.png?v=2" 
                        alt="全螢幕貼圖！Honobono × Snoopy（冬）"
                        referrerPolicy="no-referrer"
                    />
                </div>
                <div class="sticker-info">
                    <div class="sticker-title">全螢幕貼圖！Honobono × Snoopy（冬）</div>
                    <div class="author-box">
                        <a 
                            href="https://store.line.me/stickershop/author/254193/zh-Hant" 
                            target="_blank" 
                            rel="noopener noreferrer"
                        >
                            TV TOKYO Communications Corporation/SNOOPY
                        </a>
                    </div>
                    <p class="sticker-description">
                        超人氣插畫家Honobono與Snoopy的聯名貼圖化身為全螢幕貼圖登場！用溫馨可愛的Snoopy佔滿整個大螢幕來表達心情吧！是各種冬季活動的最佳良伴♪
                    </p>
                    <span class="price-text">NT$0</span>
                </div>
            </div>

            <!-- 按鈕 -->
            <div class="button-group">
                <button class="btn-gift" onclick="window.location.href='https://goodgifttosend.tw/hDMlp'">贈送禮物</button>
                <button class="btn-download" onclick="window.location.href='https://goodgifttosend.tw/hDMlp'">下載</button>
            </div>

            <!-- 貼圖網格分隔 -->
            <div class="grid-divider">
                <div class="grid-hint">點擊貼圖即可預覽。</div>
                
                <!-- 貼圖網格 -->
                <div class="sticker-grid" id="stickerGrid"></div>
            </div>
        </div>
    </div>

    <!-- 彈出視窗 -->
    <div id="modal" class="modal-overlay" style="display: none;" onclick="closeModal()">
        <div class="modal-glow"></div>
        <div class="modal-content">
            <img id="modalImage" class="modal-image" alt="全螢幕預覽" referrerPolicy="no-referrer" />
        </div>
    </div>

    <script>
        // 貼圖數據（633047198 ~ 633047221，共 24 張全螢幕動態貼圖）
        const stickers = Array.from({ length: 24 }, (_, i) => ({
            id: 633047198 + i,
            url: `https://stickershop.line-scdn.net/stickershop/v1/sticker/${633047198 + i}/iPhone/sticker@2x.png?v=2`,
            animUrl: `https://stickershop.line-scdn.net/stickershop/v1/sticker/${633047198 + i}/android/sticker_popup.png?v=2`
        }));

        // 渲染貼圖網格
        function renderStickers() {
            const grid = document.getElementById('stickerGrid');
            grid.innerHTML = stickers.map(sticker => `
                <div class="sticker-item" onclick="openModal(${sticker.id}, '${sticker.animUrl}')">
                    <img 
                        src="${sticker.url}" 
                        alt="貼圖 ${sticker.id}"
                        referrerPolicy="no-referrer"
                    />
                </div>
            `).join('');
        }

        // 打開彈出視窗
        let autoCloseTimer;
        function openModal(stickerId, animUrl) {
            const modal = document.getElementById('modal');
            const modalImage = document.getElementById('modalImage');
            
            modalImage.src = animUrl;
            modal.style.display = 'flex';

            // 清除之前的計時器
            if (autoCloseTimer) {
                clearTimeout(autoCloseTimer);
            }

            // 3 秒後自動關閉
            autoCloseTimer = setTimeout(() => {
                closeModal();
            }, 3000);
        }

        // 關閉彈出視窗
        function closeModal() {
            const modal = document.getElementById('modal');
            modal.style.display = 'none';

            // 清除計時器
            if (autoCloseTimer) {
                clearTimeout(autoCloseTimer);
            }
        }

        // 點擊背景關閉
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // 初始化
        renderStickers();
    </script>
</body>
</html>
